* { box-sizing: border-box; margin: 0; padding: 0; }

.stat-track { height: 5px; background: var(--color-border-tertiary); border-radius: 3px; margin: 3px 0; overflow: hidden; }
.stat-fill { height: 100%; border-radius: 3px; transition: width 0.35s ease; }
.f-money { background: #1D9E75; } .f-press { background: #378ADD; } .f-vest { background: #7F77DD; } .f-power { background: #BA7517; }

.alert { border-radius: var(--border-radius-md); padding: 8px 12px; font-size: 12px; line-height: 1.5; margin-bottom: 0.6rem; }
.alert-warn { background: #FAEEDA; border: 0.5px solid #EF9F27; color: #633806; }
.alert-danger { background: #FCEBEB; border: 0.5px solid #E24B4A; color: #501313; }
.alert-info { background: #E6F1FB; border: 0.5px solid #85B7EB; color: #042C53; }

.card-wrap { margin-bottom: 0.75rem; }

.card-title { font-size: 16px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; line-height: 1.35; }
.card-desc { font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; margin-bottom: 0.75rem; }

.choices { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.ch-btn { background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 10px 9px; cursor: pointer; text-align: left; transition: background 0.12s; }
.ch-btn:hover { background: var(--color-background-secondary); }
.ch-label { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 3px; line-height: 1.3; }
.ch-fx { font-size: 11px; color: var(--color-text-secondary); line-height: 1.5; }
.up { color: #0F6E56; } .dn { color: #A32D2D; }

.titles { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 0.6rem; }
.t-badge { background: #EEEDFE; border: 0.5px solid #AFA9EC; border-radius: 20px; padding: 2px 9px; font-size: 11px; color: #3C3489; }

.pres-pick { margin-top: 1.5rem; }
.pres-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 0.75rem; }
.pres-btn { background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; cursor: pointer; text-align: left; }

.pres-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.pres-desc { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }

.end-scr { text-align: center; padding: 1.5rem 0.5rem; }
.end-emoji { font-size: 40px; margin-bottom: 8px; }
.end-title { font-size: 20px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; }
.end-sub { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1.25rem; line-height: 1.6; }

.rst-btn:hover { background: var(--color-background-secondary); }
.counter { font-size: 11px; color: var(--color-text-tertiary); text-align: right; margin-bottom: 0.5rem; }

const PRES_TYPES = [
  {name:'Tecnócrata',desc:'Mejor en finanzas',bonus:'money'},
  {name:'Operador oscuro',desc:'Resiste el riesgo legal',bonus:'power'},
  {name:'Estrella mediática',desc:'Arranca con más prensa',bonus:'press'},
  {name:'Hombre del vestuario',desc:'Domina los egos',bonus:'vest'}
];

let G = {
  club:'FC Villamora', reign:1, year:2010, turns:0,
  stats:{money:55,press:55,vest:55,power:55},
  pres:null, history:[], titles:[], inherited:null,
  bombs:[], gameOver:false, endType:null,
  seen:new Set(), currentCard:null
};

function clamp(v){return Math.max(0,Math.min(100,v));}

function pickCard(){
  let pool=CARDS.filter(c=>!G.seen.has(c.id));
  if(pool.length===0){G.seen.clear();pool=CARDS.filter(c=>c.id!=='c100');}
  const s=G.stats;
  if(s.money>60&&s.press>60&&G.turns>10){
    const f=CARDS.find(c=>c.id==='c100');
    if(f)pool.push(f);
  }
  if(G.bombs.length>0&&G.turns>=G.bombs[0].at){
    const b=G.bombs.shift();
    return b.card;
  }
  return pool[Math.floor(Math.random()*pool.length)];
}

function choose(idx){
  const card=G.currentCard;
  const ch=card.choices?card[idx===0?'a':'b']:null;
  if(!ch)return;

  if(ch.win){
    G.titles.push('UEFA Champions League '+G.year);
    applyFx(ch.fx);
    log(card.title+' → '+ch.label+' ★ CAMPEONES');
    endGame('legend');return;
  }

  applyFx(ch.fx);
  if(ch.bomb){
    const pool=CARDS.filter(c=>c.id!==card.id&&!c.win);
    const bc=pool[Math.floor(Math.random()*pool.length)];
    G.bombs.push({at:G.turns+3+Math.floor(Math.random()*4),card:bc});
  }

  G.seen.add(card.id);
  G.turns++;
  if(G.turns%8===0)G.year++;
  log(card.title+' → '+ch.label);

  const end=checkEnd();
  if(end){handleReignEnd(end);return;}
  G.currentCard=pickCard();
  render();
}

function applyFx(fx){Object.keys(fx).forEach(k=>{G.stats[k]=clamp((G.stats[k]||0)+fx[k]);});}

function log(txt){G.history.push({reign:G.reign,year:G.year,pres:G.pres?G.pres.name:'',txt});}

function checkEnd(){
  const s=G.stats;
  if(s.power<=0)return'resign';
  if(s.vest<=0&&s.press<=5)return'fired';
  if(s.money<=0&&s.press<=10)return'bankrupt';
  return null;
}

function handleReignEnd(reason){
  const msgs={resign:'Perdiste todo el poder político',fired:'El vestuario y la prensa te destruyeron',bankrupt:'El club está en quiebra técnica'};
  log(msgs[reason]);
  if(G.stats.money<=0&&G.stats.press<=5&&G.stats.power<=0){endGame('collapse');return;}
  G.inherited={msg:msgs[reason]};
  G.reign++;G.pres=null;
  G.stats.money=clamp(G.stats.money-5);
  G.stats.press=clamp(G.stats.press-10);
  G.stats.vest=clamp(40+Math.floor(Math.random()*20));
  G.stats.power=clamp(40+Math.floor(Math.random()*20));
  G.turns=0;G.currentCard=null;
  render();
}

function endGame(type){G.gameOver=true;G.endType=type;render();}

function selectPres(i){
  G.pres=PRES_TYPES[i];
  G.inherited=null;
  G.stats[G.pres.bonus]=clamp(G.stats[G.pres.bonus]+15);
  G.currentCard=pickCard();
  render();
}

function restart(){
  G={club:'FC Villamora',reign:1,year:2010,turns:0,
    stats:{money:55,press:55,vest:55,power:55},
    pres:null,history:[],titles:[],inherited:null,
    bombs:[],gameOver:false,endType:null,seen:new Set(),currentCard:null};
  render();
}

function catColor(id){return (CATS.find(c=>c.id===id)||{color:'#888'}).color;}
function catLabel(id){return (CATS.find(c=>c.id===id)||{label:id}).label;}

function fxStr(fx){
  const icons={money:'💰',press:'📣',vest:'⚽',power:'👑'};
  return Object.entries(fx).map(([k,v])=>{
    const cls=v>0?'up':'dn';
    return `<span class="${cls}">${icons[k]}${v>0?'+':''}${v}</span>`;
  }).join(' ');
}

function renderStats(){
  const meta=[
    {k:'money',lbl:'💰 Dinero',fc:'f-money',nc:'n-money'},
    {k:'press',lbl:'📣 Prensa',fc:'f-press',nc:'n-press'},
    {k:'vest', lbl:'⚽ Vestuario',fc:'f-vest', nc:'n-vest'},
    {k:'power',lbl:'👑 Poder',fc:'f-power',nc:'n-power'}
  ];
  return `<div class="stats">${meta.map(m=>{
    const v=G.stats[m.k];
    return `<div class="stat">
      <div class="stat-lbl">${m.lbl}</div>
      <div class="stat-track"><div class="stat-fill ${m.fc}" style="width:${v}%"></div></div>
      <div class="stat-n ${m.nc}">${v}</div>
    </div>`;
  }).join('')}</div>`;
}

function render(){
  const el=document.getElementById('ui');
  if(G.gameOver){el.innerHTML=renderEnd();return;}
  if(!G.pres){el.innerHTML=renderPresSelect();return;}
  el.innerHTML=renderGame();
}

function renderPresSelect(){
  return `<div class="top-bar">
    <div class="club-name">${G.club}</div>
    <div class="reign-info">Reinado ${G.reign} · ${G.year}</div>
  </div>
  ${G.inherited?`<div class="alert alert-warn">${G.inherited.msg}. El club sobrevive, pero las heridas pesan.</div>`:''}
  ${renderStats()}
  <div class="pres-pick">
    <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:0.25rem">Elige tu próximo presidente</div>
    <div class="pres-grid">${PRES_TYPES.map((p,i)=>`<button class="pres-btn" onclick="selectPres(${i})">
      <div class="pres-name">${p.name}</div>
      <div class="pres-desc">${p.desc}</div>
    </button>`).join('')}</div>
  </div>`;
}

function renderGame(){
  const card=G.currentCard;
  const s=G.stats;
  const alerts=[];
  if(s.power<15)alerts.push({cls:'alert-danger',msg:'Estás perdiendo el control político. Actúa rápido.'});
  if(s.money<15)alerts.push({cls:'alert-danger',msg:'Las finanzas del club están al límite.'});
  if(s.vest<15)alerts.push({cls:'alert-warn',msg:'El vestuario está en llamas.'});
  if(s.press<15)alerts.push({cls:'alert-warn',msg:'La prensa te está destruyendo.'});
  if(G.bombs.length>0)alerts.push({cls:'alert-info',msg:'Alguna decisión pasada puede volver a golpearte...'});

  return `<div class="top-bar">
    <div class="club-name">${G.club}</div>
    <div class="reign-info">Reinado ${G.reign} · ${G.year} · ${G.pres.name}</div>
  </div>
  ${G.titles.length?`<div class="titles">${G.titles.map(t=>`<span class="t-badge">${t}</span>`).join('')}</div>`:''}
  ${renderStats()}
  ${alerts.map(a=>`<div class="alert ${a.cls}">${a.msg}</div>`).join('')}
  <div class="counter">Carta ${G.turns+1} · ${CARDS.length-G.seen.size} restantes</div>
  ${card?`<div class="card-wrap">
    <div class="ev-card">
      <div class="card-cat" style="color:${catColor(card.cat)}">${catLabel(card.cat)}</div>
      <div class="card-title">${card.title}</div>
      <div class="card-desc">${card.desc}</div>
      <div class="card-meta"><span>${G.year}</span><span>Reinado ${G.reign}</span></div>
    </div>
  </div>
  <div class="choices">
    <button class="ch-btn" onclick="choose(0)">
      <div class="ch-label">${card.a.label}</div>
      <div class="ch-fx">${fxStr(card.a.fx)}</div>
    </button>
    <button class="ch-btn" onclick="choose(1)">
      <div class="ch-label">${card.b.label}</div>
      <div class="ch-fx">${fxStr(card.b.fx)}</div>
    </button>
  </div>`:''}`;
}

function renderEnd(){
  const types={
    legend:{emoji:'🏆',title:'Leyenda del fútbol europeo'},
    collapse:{emoji:'🪦',title:'El club ha desaparecido'},
    fired:{emoji:'📉',title:'Destituido sin remisión'},
    bankrupt:{emoji:'💸',title:'Quiebra total'}
  };
  const t=types[G.endType]||types.fired;
  const rows=G.history.slice(-10).map(h=>`<div class="hist-row">Reinado ${h.reign} (${h.year}) · ${h.pres} · ${h.txt}</div>`).join('');
  return `<div class="end-scr">
    <div class="end-emoji">${t.emoji}</div>
    <div class="end-title">${t.title}</div>
    <div class="end-sub">${G.club} · ${G.year}<br>${G.reign} presidentes · ${G.titles.length?G.titles.join(', '):'Ningún título europeo'}</div>
    <div class="hist-box">${rows}</div>
    <button class="rst-btn" onclick="restart()">Nueva dinastía</button>
  </div>`;
}

render();
</script>

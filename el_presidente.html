<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>El Presidente – Sátira de Corrupción Futbolística</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#080808;min-height:100vh;display:flex;justify-content:center;font-family:'Georgia',serif;color:#f0e6d0;overscroll-behavior:none;}
#app{width:100%;max-width:430px;min-height:100vh;background:linear-gradient(160deg,#1a1208 0%,#0d0d0d 50%,#0a0a15 100%);position:relative;}
#app::before{content:'';position:fixed;top:0;left:50%;transform:translateX(-50%);width:430px;height:100%;background:repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(212,160,23,.018) 2px,rgba(212,160,23,.018) 4px);pointer-events:none;z-index:0;}
#ui{position:relative;z-index:1;padding-bottom:60px;}

/* === HEADER === */
.hdr{background:linear-gradient(180deg,rgba(18,12,4,.97) 0%,rgba(12,8,2,.93) 100%);border-bottom:1px solid rgba(212,160,23,.28);padding:10px 16px 8px;}
.hdr-row{display:flex;justify-content:space-between;align-items:center;}
.hdr-title{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#d4a017;font-family:system-ui,sans-serif;}
.hdr-weeks{font-size:11px;color:rgba(240,230,208,.55);font-family:system-ui,sans-serif;}
.hdr-club{font-size:18px;font-weight:bold;color:#f0e6d0;margin-top:1px;}
.hdr-mote{font-size:11px;color:#d4a017;font-style:italic;margin-top:1px;}

/* === STATS === */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 16px;background:rgba(0,0,0,.28);}
.stat-item{background:rgba(255,255,255,.04);border:1px solid rgba(212,160,23,.15);border-radius:8px;padding:7px 10px;transition:border-color .3s,box-shadow .3s;}
.stat-item.danger{border-color:rgba(220,50,50,.55);background:rgba(220,50,50,.07);animation:dpulse 1.4s ease-in-out infinite;}
.stat-item.hidden{opacity:.35;filter:blur(2px);}
@keyframes dpulse{0%,100%{box-shadow:0 0 0 0 rgba(220,50,50,0);}50%{box-shadow:0 0 8px 2px rgba(220,50,50,.3);}}
.stat-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.stat-lbl{font-size:10px;color:rgba(240,230,208,.55);text-transform:uppercase;letter-spacing:.05em;font-family:system-ui,sans-serif;}
.stat-val{font-size:11px;font-weight:bold;font-family:system-ui,sans-serif;}
.stat-bar{height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.stat-fill{height:100%;border-radius:2px;transition:width .4s ease;}
.fill-money{background:linear-gradient(90deg,#1d9e75,#4ecdc4);}
.fill-press{background:linear-gradient(90deg,#378add,#6fb0f5);}
.fill-vest{background:linear-gradient(90deg,#c44fa8,#e879c0);}
.fill-power{background:linear-gradient(90deg,#e5a117,#f7c948);}
.val-money{color:#4ecdc4;} .val-press{color:#6fb0f5;} .val-vest{color:#e879c0;} .val-power{color:#f7c948;}

/* === ALERTS === */
.alerts{padding:0 16px 4px;}
.alert{border-radius:6px;padding:7px 10px;font-size:12px;margin-bottom:5px;font-family:system-ui,sans-serif;line-height:1.4;border-left:3px solid;}
.a-danger{background:rgba(180,30,30,.15);border-color:#cc3333;color:#ff9999;}
.a-warn{background:rgba(180,120,0,.15);border-color:#d4a017;color:#f0c040;}
.a-info{background:rgba(30,80,180,.15);border-color:#378add;color:#88bbf0;}

/* === CARD AREA === */
.card-area{padding:6px 16px;}
.ctx-text{font-size:12px;color:rgba(240,230,208,.45);font-style:italic;text-align:center;margin-bottom:8px;font-family:system-ui,sans-serif;min-height:18px;}
.turn-badge{text-align:center;padding:2px 16px 4px;font-size:10px;color:rgba(240,230,208,.28);letter-spacing:.04em;font-family:system-ui,sans-serif;}

.card-outer{position:relative;touch-action:none;user-select:none;}
.swipe-hint{position:absolute;top:22px;font-size:12px;font-weight:700;padding:5px 11px;border-radius:6px;opacity:0;pointer-events:none;z-index:20;font-family:system-ui,sans-serif;max-width:44%;text-align:center;line-height:1.2;}
.hint-l{left:10px;color:#ff8080;background:rgba(180,30,30,.15);border:1.5px solid rgba(255,107,107,.45);}
.hint-r{right:10px;color:#80ff80;background:rgba(20,120,60,.15);border:1.5px solid rgba(81,207,102,.45);}

/* The Card */
.ev-card{background:linear-gradient(160deg,#1e1a10 0%,#16120a 100%);border:1px solid rgba(212,160,23,.32);border-radius:16px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.6),inset 0 1px 0 rgba(212,160,23,.18);transform-origin:center bottom;will-change:transform;cursor:grab;min-height:340px;display:flex;flex-direction:column;}
.ev-card.is-dragging{cursor:grabbing;}
.ev-card.fifa-boss{border:2px solid #d4a017;box-shadow:0 0 28px rgba(212,160,23,.45),0 8px 32px rgba(0,0,0,.6),inset 0 1px 0 rgba(212,160,23,.4);background:linear-gradient(160deg,#1e1500 0%,#120e00 100%);}
.card-banner{background:rgba(212,160,23,.1);border-bottom:1px solid rgba(212,160,23,.18);padding:9px 14px 8px;display:flex;justify-content:space-between;align-items:center;}
.card-cat{font-size:9px;letter-spacing:.14em;text-transform:uppercase;font-family:system-ui,sans-serif;}
.fifa-boss .card-banner{background:linear-gradient(90deg,#a07000,#c9900a,#a07000);}
.fifa-boss .card-cat{color:#1a1100;font-weight:bold;}
.card-img-area{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px 14px 12px;flex:1;}
.card-emoji{font-size:58px;line-height:1;margin-bottom:10px;text-align:center;}
.card-title{font-size:16px;font-weight:bold;color:#f0e6d0;text-align:center;margin-bottom:8px;line-height:1.3;}
.card-desc{font-size:12px;color:rgba(240,230,208,.62);text-align:center;line-height:1.6;font-family:system-ui,sans-serif;}
.card-foot{border-top:1px solid rgba(212,160,23,.13);padding:8px 14px;display:flex;justify-content:space-between;align-items:center;}
.card-week{font-size:10px;color:rgba(240,230,208,.3);font-family:system-ui,sans-serif;}

/* Swipe buttons */
.swipe-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.sw-btn{background:rgba(255,255,255,.04);border:1px solid rgba(212,160,23,.2);border-radius:10px;padding:10px 8px;cursor:pointer;font-family:'Georgia',serif;color:#f0e6d0;transition:all .15s;text-align:left;}
.sw-btn:hover{background:rgba(212,160,23,.1);border-color:rgba(212,160,23,.4);}
.sw-btn:active{transform:scale(.97);}
.sw-btn.right{text-align:right;}
.sw-dir{font-size:10px;color:rgba(240,230,208,.38);margin-bottom:3px;font-family:system-ui,sans-serif;}
.sw-lbl{font-size:12px;font-weight:bold;line-height:1.3;}
.sw-btn:not(.right) .sw-lbl{color:#ff9999;}
.sw-btn.right .sw-lbl{color:#99ffaa;}

/* === NEWSPAPER POPUP === */
.np-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.np-paper{background:#f5f0e8;border-radius:4px;max-width:380px;width:100%;color:#1a1a1a;box-shadow:0 20px 60px rgba(0,0,0,.85);animation:slideUp .3s ease;overflow:hidden;}
.np-redbar{background:#c8102e;color:#fff;text-align:center;padding:6px 16px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-family:'Georgia',serif;}
.np-name{font-size:22px;font-weight:bold;font-family:'Georgia',serif;text-align:center;border-bottom:3px double #1a1a1a;padding:10px 16px;background:#f5f0e8;}
.np-body{padding:14px 18px 16px;}
.np-headline{font-size:19px;font-weight:bold;font-family:'Georgia',serif;color:#1a1a1a;line-height:1.2;margin-bottom:8px;}
.np-sub{font-size:13px;color:#444;font-family:system-ui,sans-serif;line-height:1.5;border-left:3px solid #c8102e;padding-left:10px;margin-bottom:14px;}
.np-close{display:block;width:100%;background:#1a1a1a;color:#f5f0e8;border:none;padding:11px;font-size:13px;font-weight:bold;cursor:pointer;font-family:system-ui,sans-serif;letter-spacing:.04em;}
.np-close:hover{background:#333;}

/* === DEATH SCREEN === */
.death-screen{min-height:100vh;background:linear-gradient(160deg,#0f0000 0%,#080808 100%);}
.death-hdr{background:#c8102e;padding:16px;text-align:center;border-bottom:4px solid #8b0000;}
.death-hdr-lbl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:3px;font-family:system-ui,sans-serif;}
.death-paper{font-size:24px;font-weight:bold;color:#fff;font-family:'Georgia',serif;}
.death-body{padding:20px 16px;}
.death-hl{font-size:24px;font-weight:bold;color:#f0e6d0;font-family:'Georgia',serif;line-height:1.2;margin-bottom:10px;}
.death-sub{font-size:13px;color:rgba(240,230,208,.6);line-height:1.6;margin-bottom:20px;font-family:system-ui,sans-serif;border-left:3px solid #c8102e;padding-left:12px;}
.death-badges{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.death-badge{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:4px 12px;font-size:11px;color:rgba(240,230,208,.55);font-family:system-ui,sans-serif;}

/* === TIMELINE === */
.tl-section{padding:0 16px 16px;border-top:1px solid rgba(212,160,23,.18);}
.tl-title{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#d4a017;margin:14px 0 12px;font-family:system-ui,sans-serif;}
.tl-scroll{overflow-x:auto;padding-bottom:8px;}
.tl-track{display:flex;align-items:flex-start;min-width:max-content;padding:16px 0 6px;position:relative;}
.tl-track::before{content:'';position:absolute;top:37px;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(212,160,23,.45),transparent);}
.tl-item{display:flex;flex-direction:column;align-items:center;min-width:80px;position:relative;z-index:1;}
.tl-portrait{width:46px;height:46px;border-radius:50%;background:rgba(212,160,23,.1);border:2px solid rgba(212,160,23,.28);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:7px;position:relative;z-index:2;}
.tl-portrait.current{border-color:#d4a017;background:rgba(212,160,23,.22);box-shadow:0 0 12px rgba(212,160,23,.4);}
.tl-dot{width:10px;height:10px;border-radius:50%;background:#d4a017;border:2px solid #080808;position:absolute;top:35px;left:50%;transform:translateX(-50%);z-index:3;}
.tl-name{font-size:10px;color:rgba(240,230,208,.7);text-align:center;margin-bottom:2px;font-family:system-ui,sans-serif;max-width:74px;line-height:1.25;}
.tl-weeks{font-size:9px;color:rgba(212,160,23,.7);text-align:center;font-family:system-ui,sans-serif;}
.tl-connector{width:30px;height:2px;background:rgba(212,160,23,.25);margin-top:22px;flex-shrink:0;}

/* === DEATH ACTIONS === */
.death-actions{padding:16px;display:flex;flex-direction:column;gap:10px;}
.btn-successor{background:linear-gradient(135deg,#d4a017,#a87c0c);color:#1a1100;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:bold;cursor:pointer;font-family:'Georgia',serif;letter-spacing:.02em;box-shadow:0 4px 16px rgba(212,160,23,.3);}
.btn-successor:hover{background:linear-gradient(135deg,#e5b420,#c09010);}
.btn-restart{background:rgba(255,255,255,.05);color:rgba(240,230,208,.55);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px;font-size:13px;cursor:pointer;font-family:system-ui,sans-serif;}
.btn-restart:hover{background:rgba(255,255,255,.08);}

/* === SETUP SCREEN === */
.setup-scr{padding:32px 20px 40px;min-height:100vh;display:flex;flex-direction:column;}
.setup-logo{font-size:36px;margin-bottom:8px;}
.setup-title{font-size:28px;font-weight:bold;color:#d4a017;font-family:'Georgia',serif;margin-bottom:2px;}
.setup-sub{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(212,160,23,.55);margin-bottom:28px;font-family:system-ui,sans-serif;}
.setup-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:rgba(240,230,208,.45);margin-bottom:8px;font-family:system-ui,sans-serif;}
.setup-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(212,160,23,.3);border-radius:8px;padding:12px 14px;font-size:16px;color:#f0e6d0;font-family:'Georgia',serif;outline:none;margin-bottom:24px;}
.setup-input:focus{border-color:#d4a017;}
.setup-input::placeholder{color:rgba(240,230,208,.28);}
.setup-btn{width:100%;background:linear-gradient(135deg,#d4a017,#a87c0c);color:#1a1100;border:none;border-radius:10px;padding:15px;font-size:16px;font-weight:bold;cursor:pointer;font-family:'Georgia',serif;margin-top:auto;box-shadow:0 4px 20px rgba(212,160,23,.28);}
.setup-btn:hover{background:linear-gradient(135deg,#e5b420,#c09010);}
.setup-note{font-size:11px;color:rgba(240,230,208,.3);text-align:center;margin-top:14px;font-family:system-ui,sans-serif;line-height:1.5;}

/* === PRES SELECT === */
.pres-scr{padding:16px;}
.pres-title{font-size:13px;color:rgba(240,230,208,.55);margin-bottom:14px;font-family:system-ui,sans-serif;}
.pres-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pres-card{background:rgba(255,255,255,.04);border:1px solid rgba(212,160,23,.2);border-radius:10px;padding:14px 12px;cursor:pointer;transition:all .15s;}
.pres-card:hover{background:rgba(212,160,23,.1);border-color:rgba(212,160,23,.42);}
.pres-em{font-size:28px;margin-bottom:6px;}
.pres-name{font-size:13px;font-weight:bold;color:#f0e6d0;margin-bottom:3px;}
.pres-desc{font-size:10px;color:rgba(240,230,208,.48);font-family:system-ui,sans-serif;line-height:1.3;}
.legacy-warn{background:rgba(180,80,0,.15);border:1px solid rgba(212,160,23,.28);border-radius:8px;padding:10px 14px;font-size:12px;color:rgba(240,230,208,.68);margin-bottom:14px;font-family:system-ui,sans-serif;font-style:italic;}

/* === TOAST === */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(15,12,5,.96);border:1px solid rgba(212,160,23,.4);color:#f0e6d0;border-radius:24px;padding:9px 20px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s,transform .3s;white-space:nowrap;font-family:system-ui,sans-serif;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(212,160,23,.28);border-radius:2px;}
</style>
</head>

    headline:'¡CAMPEONES DE EUROPA! El presidente lleva el club a la gloria eterna bajo una lluvia de serpentinas doradas',
    sub:'Miles de aficionados invaden las calles. El alcalde propone poner una estatua. El presidente llora en el podio con la Copa.'},
  collapse:{paper:'El Chiringuito News',
    headline:'¡COLAPSO TOTAL! El club desaparece del mapa del fútbol profesional para siempre',
    sub:'La FIFA interviene el club. Tres jugadores ficharon por clubes de tercera. El escudo se subastó en eBay por 12 €.'}
};

const RANDOM_PAPERS=['Diario Marca-A','El Chiringuito News','La Gaceta del Palco','AS de Palo'];
const RANDOM_OPENINGS=['¡EXCLUSIVA!','¡BOMBA!','FUENTES CONFIRMAN:','¡ESCÁNDALO!','SE DESTAPA:'];
const RANDOM_SUBS=[
  'Fuentes cercanas al palco confirman que la decisión fue tomada a las 3 AM con una copa de whisky en la mano.',
  'El abogado del club ya ha pedido hora al juez. La directiva guarda silencio.',
  'El delantero del equipo rival lo sabía antes que nadie. Sospechoso, cuanto menos.',
  'La Federación ha abierto expediente. Los papeles llegaron en sobre manila sin remitente.'
];
const PORTRAITS=['👔','🎩','😤','🤵','😎','🧐','🥸','🤨','😏','🫅','👑','🤴'];

// ─────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────
function makeState(){
  return {
    screen:'setup',
    clubName:'',
    weeks:0,
    stats:{money:55,press:55,vest:55,power:55},
    statsHidden:{money:false,press:false,vest:false,power:false},
    fifaCurses:[],             // [{stat,endsAt}]
    nextFifaBossAt:50,
    fifaBossUsed:new Set(),
    presName:null,
    presBonus:null,
    reign:1,
    seen:new Set(),
    currentCard:null,
    pendingNewspaper:null,
    bombs:[],                  // [{at,card}]
    timeline:[],               // kept across "Siguiente Sucesor"
    currentPortrait:randPortrait(),
    track:{totalTurns:0,corrupt:0,honest:0},
    inherited:null,
    deathType:null
  };
}
let G=makeState();
let DRAG={active:false,startX:0,currentX:0,threshold:72,locked:false};
let toastTimer=null;

function randPortrait(){return PORTRAITS[Math.floor(Math.random()*PORTRAITS.length)];}

// ─────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────
function clamp(v){return Math.max(0,Math.min(100,v));}
function rnd(arr){return arr[Math.floor(Math.random()*arr.length)];}
function catInfo(id){return CATS.find(c=>c.id===id)||{label:id,emoji:'⚽',color:'#888'};}

function getMote(){
  for(const m of MOTE_BY_STAT){if(m.c(G))return m.n;}
  let name=MOTE_BY_WEEKS[0].n;
  for(const lvl of MOTE_BY_WEEKS){if(G.weeks>=lvl.t)name=lvl.n;}
  return name;
}

function statMeta(){
  return[
    {k:'money',lbl:'💰 Caja',    fc:'fill-money',vc:'val-money'},
    {k:'press', lbl:'📸 Prensa',  fc:'fill-press', vc:'val-press'},
    {k:'vest',  lbl:'🍺 Vestuario',fc:'fill-vest', vc:'val-vest'},
    {k:'power', lbl:'⚽ Puntos',  fc:'fill-power', vc:'val-power'}
  ];
}

// ─────────────────────────────────────────────────────────────────
// CARD PICKING
// ─────────────────────────────────────────────────────────────────
function pickCard(){
  // FIFA Boss check
  if(G.weeks>=G.nextFifaBossAt){
    const avail=FIFA_BOSS_CARDS.filter(c=>!G.fifaBossUsed.has(c.id));
    if(avail.length>0){
      G.nextFifaBossAt+=50;
      const bc=rnd(avail);
      G.fifaBossUsed.add(bc.id);
      return bc;
    }
  }
  // Bomb queue
  if(G.bombs.length>0&&G.weeks>=G.bombs[0].at){
    return G.bombs.shift().card;
  }
  let pool=CARDS.filter(c=>!G.seen.has(c.id));
  if(pool.length===0){G.seen.clear();pool=CARDS.filter(c=>c.id!=='c100');}
  // Champions card when doing well
  if(G.stats.money>60&&G.stats.press>60&&G.weeks>30){
    const f=CARDS.find(c=>c.id==='c100');
    if(f&&!G.seen.has('c100'))pool.push(f);
  }
  return rnd(pool);
}

// ─────────────────────────────────────────────────────────────────
// CHOOSE
// ─────────────────────────────────────────────────────────────────
function choose(idx){
  if(DRAG.locked)return;
  const card=G.currentCard;
  if(!card)return;
  const ch=idx===0?card.a:card.b;
  const other=idx===0?card.b:card.a;
  if(!ch)return;

  try{
    // Track
    if(ch.bomb){G.track.corrupt++;}
    else if(other&&other.bomb){G.track.honest++;}

    // Win
    if(ch.win){
      applyFx(ch.fx);
      G.weeks++;G.track.totalTurns++;
      G.seen.add(card.id);
      endRound('legend');
      return;
    }

    applyFx(ch.fx);

    // FIFA curse
    if(ch.fifaCurse){
      G.fifaCurses.push({stat:ch.fifaCurse.stat,endsAt:G.weeks+ch.fifaCurse.weeks});
      G.statsHidden[ch.fifaCurse.stat]=true;
      showToast('⚠️ El Gran Jefe oculta tu '+statLabel(ch.fifaCurse.stat)+' durante '+ch.fifaCurse.weeks+' semanas');
    }

    // Schedule bomb card
    if(ch.bomb){
      const pool=CARDS.filter(c=>c.id!==card.id&&!c.win);
      G.bombs.push({at:G.weeks+3+Math.floor(Math.random()*4),card:rnd(pool)});
    }

    // Newspaper popup
    if(card.paper&&idx===0&&ch.bomb){
      G.pendingNewspaper=card.paper;
    } else if(ch.bomb&&Math.random()<0.55){
      G.pendingNewspaper={
        name:rnd(RANDOM_PAPERS),
        headline:rnd(RANDOM_OPENINGS)+' '+card.title.toUpperCase()+' — El presidente implicado',
        sub:rnd(RANDOM_SUBS)
      };
    }

    G.seen.add(card.id);
    G.weeks++;G.track.totalTurns++;
    tickFifaCurses();

    const end=checkEnd();
    if(end){endRound(end);return;}

    G.currentCard=pickCard();
    render();
  }finally{DRAG.locked=false;}
}

function applyFx(fx){
  Object.keys(fx).forEach(k=>{
    if(G.stats[k]!==undefined)G.stats[k]=clamp(G.stats[k]+fx[k]);
  });
}

function tickFifaCurses(){
  G.fifaCurses=G.fifaCurses.filter(c=>{
    if(G.weeks>=c.endsAt){
      G.statsHidden[c.stat]=false;
      showToast('🎉 '+statLabel(c.stat)+' ya es visible de nuevo');
      return false;
    }
    return true;
  });
}

function statLabel(k){return({money:'💰 Caja',press:'📸 Prensa',vest:'🍺 Vestuario',power:'⚽ Puntos'})[k]||k;}

function checkEnd(){
  const s=G.stats;
  if(s.press<=0)return'press';
  if(s.money<=0)return'money';
  if(s.vest<=0)return'vest';
  if(s.power<=0)return'power';
  if(s.press>=100&&s.money<10&&s.vest<10)return'collapse';
  return null;
}

// ─────────────────────────────────────────────────────────────────
// ROUND END / DEATH
// ─────────────────────────────────────────────────────────────────
function endRound(type){
  G.deathType=type;
  // Save to timeline
  G.timeline.push({
    pres:G.presName||'Desconocido',
    weeks:G.weeks,
    cause:type,
    portrait:G.currentPortrait,
    reign:G.reign
  });
  G.screen='death';
  G.pendingNewspaper=null;
  render();
}

// "Siguiente Sucesor" – new reign, keep timeline
function nextSuccessor(){
  const tl=G.timeline;
  const clubName=G.clubName;
  const newG=makeState();
  newG.timeline=tl;
  newG.clubName=clubName;
  newG.reign=tl.length+1;
  // Inherit slightly degraded stats
  const last=tl[tl.length-1];
  const penalty=last&&last.cause==='legend'?0:10;
  newG.stats.money=clamp(55-penalty);
  newG.stats.press=clamp(55-penalty);
  newG.screen='presSelect';
  newG.inherited=last?humanCause(last.cause):null;
  G=newG;
  render();
}

// Full restart
function fullRestart(){
  G=makeState();
  render();
}

function humanCause(c){
  return{press:'La prensa destruyó al presidente anterior',money:'El club está casi en quiebra',
    vest:'El vestuario está en llamas',power:'El poder quedó destrozado',
    legend:'El legado anterior fue glorioso',collapse:'El club casi desapareció'}[c]||'El mandato anterior terminó mal';
}

// ─────────────────────────────────────────────────────────────────
// PRES SELECT
// ─────────────────────────────────────────────────────────────────
const PRES_TYPES=[
  {emoji:'💼',name:'Tecnócrata',     desc:'Arranca con +15 Caja',     bonus:'money'},
  {emoji:'🕶️',name:'Operador Oscuro',desc:'Arranca con +15 Puntos',   bonus:'power'},
  {emoji:'📸',name:'Estrella Mediática',desc:'Arranca con +15 Prensa',bonus:'press'},
  {emoji:'🍺',name:'Hombre del Vestuario',desc:'Arranca con +15 Vestuario',bonus:'vest'}
];

function selectPres(i){
  const p=PRES_TYPES[i];
  G.presName=p.name;
  G.presBonus=p.bonus;
  G.stats[p.bonus]=clamp(G.stats[p.bonus]+15);
  G.currentPortrait=randPortrait();
  G.currentCard=pickCard();
  G.screen='game';
  render();
}

// Setup
function startGame(){
  const inp=document.getElementById('club-name-input');
  const name=(inp?inp.value.trim():'')||'Mi Club FC';
  G.clubName=name;
  G.screen='presSelect';
  render();
}

// Close newspaper
function closeNewspaper(){
  G.pendingNewspaper=null;
  render();
}

// ─────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────
function render(){
  const el=document.getElementById('ui');
  if(!el)return;
  if(G.pendingNewspaper){el.innerHTML=renderGame();showNewspaper();return;}
  if(G.screen==='setup')   {el.innerHTML=renderSetup();attachSetup();return;}
  if(G.screen==='presSelect'){el.innerHTML=renderPresSelect();return;}
  if(G.screen==='death')   {el.innerHTML=renderDeath();return;}
  el.innerHTML=renderGame();
  attachSwipe();
}

// ── Setup ──
function renderSetup(){
  return`<div class="setup-scr">
    <div class="setup-logo">⚽</div>
    <div class="setup-title">El Presidente</div>
    <div class="setup-sub">Sátira de Corrupción Futbolística</div>
    <div class="setup-lbl">Nombre del club</div>
    <input id="club-name-input" class="setup-input" type="text" maxlength="30"
      placeholder="Ej: FC Torrelodones" value="${esc(G.clubName)}">
    <button class="setup-btn" onclick="startGame()">Tomar el mando →</button>
    <div class="setup-note">Swipe a la derecha para aceptar · Swipe a la izquierda para rechazar<br>Las decisiones tienen consecuencias…</div>
  </div>`;
}
function attachSetup(){
  const inp=document.getElementById('club-name-input');
  if(inp)inp.addEventListener('keydown',e=>{if(e.key==='Enter')startGame();});
}

// ── Pres Select ──
function renderPresSelect(){
  return`<div class="pres-scr">
    ${renderHeader()}
    ${G.inherited?`<div class="legacy-warn">⚠️ ${esc(G.inherited)}. El club sobrevive, pero las heridas pesan.</div>`:''}
    ${renderStats()}
    <div class="pres-title">Elige tu nuevo presidente (Mandato ${G.reign})</div>
    <div class="pres-grid">${PRES_TYPES.map((p,i)=>`
      <div class="pres-card" onclick="selectPres(${i})">
        <div class="pres-em">${p.emoji}</div>
        <div class="pres-name">${p.name}</div>
        <div class="pres-desc">${p.desc}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

// ── Game ──
function renderGame(){
  const card=G.currentCard;
  const s=G.stats;
  const alerts=[];
  if(s.power<15)alerts.push({cls:'a-danger',msg:'Estás perdiendo el control político. Actúa rápido.'});
  if(s.money<15)alerts.push({cls:'a-danger',msg:'Las finanzas del club están al límite.'});
  if(s.vest<15) alerts.push({cls:'a-warn',  msg:'El vestuario está en llamas.'});
  if(s.press<15)alerts.push({cls:'a-warn',  msg:'La prensa te está destruyendo.'});
  if(G.bombs.length>0)alerts.push({cls:'a-info',msg:'Alguna decisión pasada puede volver a golpearte…'});

  return`
    ${renderHeader()}
    ${renderStats()}
    <div class="alerts">${alerts.map(a=>`<div class="alert ${a.cls}">${a.msg}</div>`).join('')}</div>
    <div class="turn-badge">Semana ${G.weeks+1} · Mandato ${G.reign} · ${esc(G.presName||'')}</div>
    ${card?renderCard(card):''}
  `;
}

function renderHeader(){
  return`<div class="hdr">
    <div class="hdr-row">
      <div class="hdr-title">El Presidente</div>
      <div class="hdr-weeks">Semana ${G.weeks} de mandato</div>
    </div>
    <div class="hdr-club">${esc(G.clubName)}</div>
    <div class="hdr-mote">${getMote()}</div>
  </div>`;
}

function renderStats(){
  return`<div class="stats-grid">${statMeta().map(m=>{
    const v=G.stats[m.k];
    const hidden=G.statsHidden[m.k];
    const danger=v<15;
    return`<div class="stat-item${danger?' danger':''}${hidden?' hidden':''}">
      <div class="stat-hdr">
        <span class="stat-lbl">${m.lbl}</span>
        <span class="stat-val ${m.vc}">${hidden?'???':v}</span>
      </div>
      <div class="stat-bar"><div class="stat-fill ${m.fc}" style="width:${hidden?50:v}%"></div></div>
    </div>`;
  }).join('')}</div>`;
}

function renderCard(card){
  const cat=catInfo(card.cat);
  const isBoss=!!card.isFifaBoss;
  return`<div class="card-area">
    <div class="ctx-text">${esc(card.ctx||'')}</div>
    <div class="card-outer" id="card-outer">
      <div class="swipe-hint hint-l" id="hint-l">← ${esc(card.b.label)}</div>
      <div class="swipe-hint hint-r" id="hint-r">${esc(card.a.label)} →</div>
      <div class="ev-card${isBoss?' fifa-boss':''}" id="ev-card">
        <div class="card-banner">
          <span class="card-cat" style="color:${isBoss?'#1a1100':cat.color}">${isBoss?'⭐ EL GRAN JEFE DE LA FIFA':cat.emoji+' '+cat.label}</span>
        </div>
        <div class="card-img-area">
          <div class="card-emoji">${card.emoji}</div>
          <div class="card-title">${esc(card.title)}</div>
          <div class="card-desc">${esc(card.desc)}</div>
        </div>
        <div class="card-foot">
          <span class="card-week">Sem. ${G.weeks+1}</span>
          <span class="card-week">Mandato ${G.reign}</span>
        </div>
      </div>
    </div>
    <div class="swipe-actions">
      <button class="sw-btn" onclick="choose(1)">
        <div class="sw-dir">← Rechazar</div>
        <div class="sw-lbl">${esc(card.b.label)}</div>
      </button>
      <button class="sw-btn right" onclick="choose(0)">
        <div class="sw-dir">Aceptar →</div>
        <div class="sw-lbl">${esc(card.a.label)}</div>
      </button>
    </div>
  </div>`;
}

// ── Newspaper ──
function showNewspaper(){
  const np=G.pendingNewspaper;
  if(!np)return;
  let overlay=document.getElementById('np-overlay');
  if(!overlay){
    overlay=document.createElement('div');
    overlay.id='np-overlay';
    overlay.className='np-overlay';
    document.getElementById('app').appendChild(overlay);
  }
  overlay.innerHTML=`<div class="np-paper">
    <div class="np-redbar">Edición especial · Noticias de última hora</div>
    <div class="np-name">${esc(np.name)}</div>
    <div class="np-body">
      <div class="np-headline">${esc(np.headline)}</div>
      <div class="np-sub">${esc(np.sub)}</div>
    </div>
    <button class="np-close" onclick="closeNewspaper()">CERRAR EDICIÓN ESPECIAL ✕</button>
  </div>`;
  overlay.style.display='flex';
}

// ── Death ──
function renderDeath(){
  const type=G.deathType||'power';
  const hl=DEATH_HL[type]||DEATH_HL.power;
  const last=G.timeline[G.timeline.length-1];

  return`<div class="death-screen">
    <div class="death-hdr">
      <div class="death-hdr-lbl">Crónica Negra · Edición Especial</div>
      <div class="death-paper">${esc(hl.paper)}</div>
    </div>
    <div class="death-body">
      <div class="death-hl">${esc(hl.headline)}</div>
      <div class="death-sub">${esc(hl.sub)}</div>
      <div class="death-badges">
        <span class="death-badge">⏱ ${last?last.weeks:G.weeks} semanas de mandato</span>
        <span class="death-badge">📋 Mandato ${G.reign}</span>
        <span class="death-badge">🏷 ${getMote()}</span>
      </div>
    </div>
    <div class="tl-section">
      <div class="tl-title">🕰 Línea de Mandatos</div>
      ${renderTimeline()}
    </div>
    <div class="death-actions">
      <button class="btn-successor" onclick="nextSuccessor()">👔 Siguiente Sucesor</button>
      <button class="btn-restart"   onclick="fullRestart()">↺ Nueva Dinastía (borrar todo)</button>
    </div>
  </div>`;
}

function renderTimeline(){
  if(G.timeline.length===0)return`<div style="font-size:12px;color:rgba(240,230,208,.3);font-family:system-ui,sans-serif;padding:8px 0;">Aún no hay historia que contar.</div>`;
  const items=G.timeline.map((item,i)=>{
    const isCurrent=i===G.timeline.length-1;
    const causeBadge={legend:'🏆',press:'📰',money:'💸',vest:'🍺',power:'👊',collapse:'💀'}[item.cause]||'❓';
    return`<div class="tl-item">
      <div class="tl-portrait${isCurrent?' current':''}">${item.portrait}</div>
      <div class="tl-dot"></div>
      <div class="tl-name">${causeBadge} Mandato ${item.reign}</div>
      <div class="tl-weeks">${item.weeks} sem.</div>
    </div>`;
  });
  // Interleave connectors
  const withConnectors=[];
  items.forEach((it,i)=>{
    withConnectors.push(it);
    if(i<items.length-1)withConnectors.push(`<div class="tl-connector"></div>`);
  });
  return`<div class="tl-scroll"><div class="tl-track">${withConnectors.join('')}</div></div>`;
}

// ─────────────────────────────────────────────────────────────────
// SWIPE
// ─────────────────────────────────────────────────────────────────
function attachSwipe(){
  const outer=document.getElementById('card-outer');
  if(!outer)return;
  outer.addEventListener('pointerdown',onDown,{passive:false});
  outer.addEventListener('pointermove',onMove,{passive:false});
  outer.addEventListener('pointerup',onUp,{passive:false});
  outer.addEventListener('pointercancel',onCancel);
}

function onDown(e){
  if(DRAG.locked)return;
  e.preventDefault();
  DRAG.active=true;
  DRAG.startX=e.clientX;
  DRAG.currentX=e.clientX;
  try{document.getElementById('card-outer').setPointerCapture(e.pointerId);}catch(_){DRAG.active=false;return;}
  const card=document.getElementById('ev-card');
  if(card){card.style.transition='none';card.classList.add('is-dragging');}
}

function onMove(e){
  if(!DRAG.active)return;
  e.preventDefault();
  DRAG.currentX=e.clientX;
  updateDrag();
}

function onUp(e){
  if(!DRAG.active)return;
  DRAG.active=false;
  const dx=DRAG.currentX-DRAG.startX;
  const card=document.getElementById('ev-card');
  if(card)card.classList.remove('is-dragging');
  if(Math.abs(dx)>=DRAG.threshold){
    DRAG.locked=true;
    animateOut(dx>0?'right':'left',dx>0?0:1);
  }else{
    snapBack();
  }
}

function onCancel(){DRAG.active=false;snapBack();}

function updateDrag(){
  const card=document.getElementById('ev-card');
  const hl=document.getElementById('hint-l');
  const hr=document.getElementById('hint-r');
  if(!card)return;
  const dx=DRAG.currentX-DRAG.startX;
  const rot=dx*0.07;
  card.style.transform=`translateX(${dx}px) rotate(${rot}deg)`;
  const pct=Math.min(Math.abs(dx)/DRAG.threshold,1);
  if(hr)hr.style.opacity=dx>0?pct:0;
  if(hl)hl.style.opacity=dx<0?pct:0;
}

function snapBack(){
  const card=document.getElementById('ev-card');
  const hl=document.getElementById('hint-l');
  const hr=document.getElementById('hint-r');
  if(card){card.style.transition='transform .35s cubic-bezier(.25,.8,.25,1)';card.style.transform='';}
  if(hl)hl.style.opacity=0;
  if(hr)hr.style.opacity=0;
}

function animateOut(dir,idx){
  const card=document.getElementById('ev-card');
  if(card){
    card.style.transition='transform .28s ease-in,opacity .28s ease-in';
    card.style.transform=`translateX(${dir==='right'?340:-340}px) rotate(${dir==='right'?18:-18}deg)`;
    card.style.opacity='0';
  }
  setTimeout(()=>{DRAG.locked=false;choose(idx);},290);
}

// ─────────────────────────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  if(!t)return;
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

// ─────────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────────
function esc(s){
  if(s===null||s===undefined)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────
render();
</script>

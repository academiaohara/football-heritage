<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#d4a017" />
  <meta name="description" content="Gestiona un club de fútbol a través de generaciones de presidentes corruptos. Toma decisiones difíciles y construye un legado." />
  <title>Football Heritage – El Presidente</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #3a0008;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    .splash {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 56px;
      text-align: center;
      padding: 24px;
    }

    /* Logo image */
    .logo-img {
      width: min(340px, 70vw);
      height: auto;
      transition: filter 0.3s ease, transform 0.3s ease;
      filter: drop-shadow(0 0 0px #d4a017);
    }

    .logo-img:hover,
    body:hover .logo-img {
      filter:
        drop-shadow(0 0 18px #d4a017)
        drop-shadow(0 0 40px rgba(212, 160, 23, 0.55))
        brightness(1.15);
      transform: scale(1.04);
    }

    /* Pixel-art press-to-start text */
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    .press-start {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(10px, 2.2vw, 16px);
      color: #d4a017;
      letter-spacing: 0.05em;
      line-height: 1.8;
      animation: blink 1.1s step-end infinite;
      text-shadow:
        0 0 8px rgba(212, 160, 23, 0.7),
        0 0 20px rgba(212, 160, 23, 0.35);
    }
  </style>
</head>
<body onclick="window.location.href='football_heritage.html'">
  <main class="splash">
    <img class="logo-img" src="Logo.png" alt="Football Heritage" />
    <p class="press-start">PULSA PARA COMENZAR</p>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>El Presidente &ndash; Sátira de Corrupción Futbolística</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#030610;min-height:100vh;display:flex;justify-content:center;font-family:'Georgia',serif;color:#f0e6d0;overscroll-behavior:none;}

/* === APP CONTAINER – dark atmospheric sky === */
#app{width:100%;max-width:430px;min-height:100vh;background:linear-gradient(180deg,#050b1e 0%,#080d20 25%,#0a1028 50%,#0d0f18 75%,#080808 100%);position:relative;}

/* === STARRY SKY + MOON overlay (fixed, centered over the 430 px container) === */
#app::before{
  content:'';position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:430px;height:100%;
  background-image:
    /* Moon glow */
    radial-gradient(circle 24px at 87% 6%,#f8f0c8 0%,rgba(248,240,200,.55) 45%,transparent 72%),
    /* Stars */
    radial-gradient(2px 2px at 8% 5%,#fff 0%,transparent 100%),
    radial-gradient(1px 1px at 16% 12%,rgba(255,255,255,.8) 0%,transparent 100%),
    radial-gradient(2px 2px at 27% 3%,#fff 0%,transparent 100%),
    radial-gradient(1px 1px at 38% 8%,rgba(255,255,255,.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 50% 15%,rgba(255,255,255,.9) 0%,transparent 100%),
    radial-gradient(2px 2px at 61% 4%,#fff 0%,transparent 100%),
    radial-gradient(1px 1px at 72% 10%,rgba(255,255,255,.75) 0%,transparent 100%),
    radial-gradient(1px 1px at 83% 7%,rgba(255,255,255,.85) 0%,transparent 100%),
    radial-gradient(2px 2px at 91% 18%,#fff 0%,transparent 100%),
    radial-gradient(1px 1px at 5% 22%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 21% 28%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 44% 25%,rgba(255,255,255,.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 58% 20%,rgba(255,255,255,.65) 0%,transparent 100%),
    radial-gradient(1px 1px at 77% 30%,rgba(255,255,255,.55) 0%,transparent 100%),
    radial-gradient(2px 2px at 95% 14%,rgba(255,255,255,.9) 0%,transparent 100%),
    radial-gradient(1px 1px at 33% 35%,rgba(255,255,255,.45) 0%,transparent 100%),
    radial-gradient(1px 1px at 67% 32%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 12% 40%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(2px 2px at 88% 38%,rgba(255,255,255,.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 55% 42%,rgba(255,255,255,.35) 0%,transparent 100%);
  pointer-events:none;z-index:0;
}

/* UI content layer */
#ui{position:relative;z-index:1;padding-bottom:60px;}

/* === MOUNTAIN SVG at bottom of game screen === */
.mountains-bg{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:430px;pointer-events:none;z-index:0;display:block;}

/* === REIGNS GAME LAYOUT === */
.reigns-screen{position:relative;}

/* === TOP BAR: [presName]  [4 icons]  [weeks] === */
.reigns-top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 6px;position:relative;z-index:2;}
.pixel-name{font-family:'Press Start 2P',monospace;font-size:7px;color:#fff;text-shadow:1px 1px 0 rgba(0,0,0,.85);line-height:1.6;max-width:88px;word-break:break-word;}
.pixel-score{font-family:'Press Start 2P',monospace;font-size:16px;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.85);min-width:28px;text-align:right;}
.pixel-sub{text-align:center;font-family:'Press Start 2P',monospace;font-size:5px;color:rgba(255,255,255,.6);text-shadow:1px 1px 0 rgba(0,0,0,.8);padding:0 14px 8px;position:relative;z-index:2;line-height:1.9;}

/* === SCOREBOARD ICONS === */
.scoreboard-icons{display:flex;gap:16px;align-items:center;}
.score-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;opacity:.88;transition:opacity .3s,filter .3s;flex-shrink:0;}
.score-icon.score-danger{opacity:1;animation:icon-pulse 1.4s ease-in-out infinite;}
@keyframes icon-pulse{0%,100%{filter:none;}50%{filter:drop-shadow(0 0 5px #ff4444);}}
.score-icon.score-hidden{opacity:.25;filter:blur(1px);}

/* === ALERTS === */
.alerts{padding:0 16px 4px;}
.alert{border-radius:6px;padding:7px 10px;font-size:12px;margin-bottom:5px;font-family:system-ui,sans-serif;line-height:1.4;border-left:3px solid;}
.a-danger{background:rgba(180,30,30,.15);border-color:#cc3333;color:#ff9999;}
.a-warn{background:rgba(180,120,0,.15);border-color:#d4a017;color:#f0c040;}
.a-info{background:rgba(30,80,180,.15);border-color:#378add;color:#88bbf0;}

/* === CARD AREA === */
.card-area{padding:6px 16px;}
.ctx-text{font-size:12px;color:rgba(240,230,208,.5);font-style:italic;text-align:center;margin-bottom:8px;font-family:system-ui,sans-serif;min-height:18px;}
.card-outer{position:relative;touch-action:none;user-select:none;}
.swipe-hint{position:absolute;top:22px;font-size:12px;font-weight:700;padding:5px 11px;border-radius:6px;opacity:0;pointer-events:none;z-index:20;font-family:system-ui,sans-serif;max-width:44%;text-align:center;line-height:1.2;}
.hint-l{left:10px;color:#ff8080;background:rgba(180,30,30,.15);border:1.5px solid rgba(255,107,107,.45);}
.hint-r{right:10px;color:#80ff80;background:rgba(20,120,60,.15);border:1.5px solid rgba(81,207,102,.45);}

/* === REIGNS-STYLE CARD (cream paper) === */
.ev-card{background:#f5e6c8;border:none;border-radius:20px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.65),0 2px 8px rgba(0,0,0,.35);min-height:320px;display:flex;flex-direction:column;transform-origin:center bottom;will-change:transform;cursor:grab;}
.ev-card.is-dragging{cursor:grabbing;}
.ev-card.fifa-boss .card-illus{background:linear-gradient(160deg,#7a0000 0%,#4a0000 100%) !important;}

/* Card illustration area (top coloured block) */
.card-illus{height:170px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.card-illus::after{content:'';position:absolute;bottom:0;left:0;right:0;height:24px;background:linear-gradient(transparent,rgba(0,0,0,.22));pointer-events:none;}
.card-emoji{font-size:62px;line-height:1;margin-bottom:6px;text-align:center;filter:drop-shadow(0 2px 8px rgba(0,0,0,.35));position:relative;z-index:1;}
.card-cat{font-size:7px;letter-spacing:.12em;text-transform:uppercase;font-family:'Press Start 2P',monospace;color:rgba(255,255,255,.88);text-shadow:1px 1px 0 rgba(0,0,0,.5);position:relative;z-index:1;}
.fifa-boss .card-cat{color:#ffe080;}

/* Card paper content area */
.card-paper{background:#f5e6c8;padding:14px 16px 8px;flex:1;display:flex;flex-direction:column;}
.card-title{font-family:'Press Start 2P',monospace;font-size:8px;color:#2a1800;line-height:1.75;margin-bottom:8px;}
.card-desc{font-size:12px;color:#5a3a10;line-height:1.65;font-family:'Georgia',serif;flex:1;margin-bottom:6px;}

/* Card FX preview (on cream background) */
.card-fx-preview{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:6px 0 4px;padding:6px 0;border-top:1px solid rgba(90,58,16,.18);border-bottom:1px solid rgba(90,58,16,.18);}
.card-fx-col{display:flex;flex-wrap:wrap;gap:4px;align-items:center;font-size:11px;font-family:system-ui,sans-serif;}
.card-fx-right{justify-content:flex-end;}
.fx-dir{font-size:10px;font-weight:700;color:rgba(90,58,16,.45);}
.fx-tag{padding:2px 5px;border-radius:4px;font-weight:700;font-size:10px;}
.fx-up{background:rgba(20,120,80,.18);color:#0a6e4a;}
.fx-dn{background:rgba(160,40,40,.15);color:#8b1515;}
.card-foot{border-top:1px solid rgba(90,58,16,.12);padding:6px 0 2px;display:flex;justify-content:space-between;}
.card-week{font-size:9px;color:rgba(90,58,16,.42);font-family:system-ui,sans-serif;}

/* Swipe buttons */
.swipe-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.sw-btn{background:rgba(255,255,255,.04);border:1px solid rgba(212,160,23,.22);border-radius:10px;padding:10px 8px;cursor:pointer;font-family:'Georgia',serif;color:#f0e6d0;transition:all .15s;text-align:left;}
.sw-btn:hover{background:rgba(212,160,23,.1);border-color:rgba(212,160,23,.45);}
.sw-btn:active{transform:scale(.97);}
.sw-btn.right{text-align:right;}
.sw-dir{font-size:10px;color:rgba(240,230,208,.38);margin-bottom:3px;font-family:system-ui,sans-serif;}
.sw-lbl{font-size:12px;font-weight:bold;line-height:1.3;}
.sw-btn:not(.right) .sw-lbl{color:#ff9999;}
.sw-btn.right .sw-lbl{color:#99ffaa;}

/* === STATS GRID (kept for presSelect screen) === */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 16px;background:rgba(0,0,0,.28);}
.stat-item{background:rgba(255,255,255,.04);border:1px solid rgba(212,160,23,.15);border-radius:8px;padding:7px 10px;transition:border-color .3s,box-shadow .3s;}
.stat-item.danger{border-color:rgba(220,50,50,.55);background:rgba(220,50,50,.07);animation:dpulse 1.4s ease-in-out infinite;}
.stat-item.hidden{opacity:.35;filter:blur(2px);}
@keyframes dpulse{0%,100%{box-shadow:0 0 0 0 rgba(220,50,50,0);}50%{box-shadow:0 0 8px 2px rgba(220,50,50,.3);}}
.stat-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.stat-lbl{font-size:10px;color:rgba(240,230,208,.55);text-transform:uppercase;letter-spacing:.05em;font-family:system-ui,sans-serif;}
.stat-val{font-size:11px;font-weight:bold;font-family:system-ui,sans-serif;}
.stat-bar{height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.stat-fill{height:100%;border-radius:2px;transition:width .4s ease;}
.fill-money{background:linear-gradient(90deg,#1d9e75,#4ecdc4);}
.fill-press{background:linear-gradient(90deg,#378add,#6fb0f5);}
.fill-vest{background:linear-gradient(90deg,#c44fa8,#e879c0);}
.fill-power{background:linear-gradient(90deg,#e5a117,#f7c948);}
.val-money{color:#4ecdc4;} .val-press{color:#6fb0f5;} .val-vest{color:#e879c0;} .val-power{color:#f7c948;}

/* === HEADER (kept for presSelect/setup screens) === */
.hdr{background:linear-gradient(180deg,rgba(18,12,4,.97) 0%,rgba(12,8,2,.93) 100%);border-bottom:1px solid rgba(212,160,23,.28);padding:10px 16px 8px;}
.hdr-row{display:flex;justify-content:space-between;align-items:center;}
.hdr-title{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#d4a017;font-family:system-ui,sans-serif;}
.hdr-weeks{font-size:11px;color:rgba(240,230,208,.55);font-family:system-ui,sans-serif;}
.hdr-club{font-size:18px;font-weight:bold;color:#f0e6d0;margin-top:1px;}
.hdr-mote{font-size:11px;color:#d4a017;font-style:italic;margin-top:1px;}

/* === NEWSPAPER POPUP === */
.np-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.np-paper{background:#f5f0e8;border-radius:4px;max-width:380px;width:100%;color:#1a1a1a;box-shadow:0 20px 60px rgba(0,0,0,.85);animation:slideUp .3s ease;overflow:hidden;}
.np-redbar{background:#c8102e;color:#fff;text-align:center;padding:6px 16px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-family:'Georgia',serif;}
.np-name{font-size:22px;font-weight:bold;font-family:'Georgia',serif;text-align:center;border-bottom:3px double #1a1a1a;padding:10px 16px;background:#f5f0e8;}
.np-body{padding:14px 18px 16px;}
.np-headline{font-size:19px;font-weight:bold;font-family:'Georgia',serif;color:#1a1a1a;line-height:1.2;margin-bottom:8px;}
.np-sub{font-size:13px;color:#444;font-family:system-ui,sans-serif;line-height:1.5;border-left:3px solid #c8102e;padding-left:10px;margin-bottom:14px;}
.np-close{display:block;width:100%;background:#1a1a1a;color:#f5f0e8;border:none;padding:11px;font-size:13px;font-weight:bold;cursor:pointer;font-family:system-ui,sans-serif;letter-spacing:.04em;}
.np-close:hover{background:#333;}

/* === DEATH SCREEN === */
.death-screen{min-height:100vh;background:linear-gradient(160deg,#0f0000 0%,#080808 100%);}
.death-hdr{background:#c8102e;padding:16px;text-align:center;border-bottom:4px solid #8b0000;}
.death-hdr-lbl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:3px;font-family:system-ui,sans-serif;}
.death-paper{font-size:24px;font-weight:bold;color:#fff;font-family:'Georgia',serif;}
.death-body{padding:20px 16px;}
.death-hl{font-size:24px;font-weight:bold;color:#f0e6d0;font-family:'Georgia',serif;line-height:1.2;margin-bottom:10px;}
.death-sub{font-size:13px;color:rgba(240,230,208,.6);line-height:1.6;margin-bottom:20px;font-family:system-ui,sans-serif;border-left:3px solid #c8102e;padding-left:12px;}
.death-badges{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.death-badge{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:4px 12px;font-size:11px;color:rgba(240,230,208,.55);font-family:system-ui,sans-serif;}

/* === TIMELINE === */
.tl-section{padding:0 16px 16px;border-top:1px solid rgba(212,160,23,.18);}
.tl-title{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#d4a017;margin:14px 0 12px;font-family:system-ui,sans-serif;}
.tl-scroll{overflow-x:auto;padding-bottom:8px;}
.tl-track{display:flex;align-items:flex-start;min-width:max-content;padding:16px 0 6px;position:relative;}
.tl-track::before{content:'';position:absolute;top:37px;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(212,160,23,.45),transparent);}
.tl-item{display:flex;flex-direction:column;align-items:center;min-width:80px;position:relative;z-index:1;}
.tl-portrait{width:46px;height:46px;border-radius:50%;background:rgba(212,160,23,.1);border:2px solid rgba(212,160,23,.28);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:7px;position:relative;z-index:2;}
.tl-portrait.current{border-color:#d4a017;background:rgba(212,160,23,.22);box-shadow:0 0 12px rgba(212,160,23,.4);}
.tl-dot{width:10px;height:10px;border-radius:50%;background:#d4a017;border:2px solid #080808;position:absolute;top:35px;left:50%;transform:translateX(-50%);z-index:3;}
.tl-name{font-size:10px;color:rgba(240,230,208,.7);text-align:center;margin-bottom:2px;font-family:system-ui,sans-serif;max-width:74px;line-height:1.25;}
.tl-weeks{font-size:9px;color:rgba(212,160,23,.7);text-align:center;font-family:system-ui,sans-serif;}
.tl-connector{width:30px;height:2px;background:rgba(212,160,23,.25);margin-top:22px;flex-shrink:0;}

/* === DEATH ACTIONS === */
.death-actions{padding:16px;display:flex;flex-direction:column;gap:10px;}
.btn-successor{background:linear-gradient(135deg,#d4a017,#a87c0c);color:#1a1100;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:bold;cursor:pointer;font-family:'Georgia',serif;letter-spacing:.02em;box-shadow:0 4px 16px rgba(212,160,23,.3);}
.btn-successor:hover{background:linear-gradient(135deg,#e5b420,#c09010);}
.btn-restart{background:rgba(255,255,255,.05);color:rgba(240,230,208,.55);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px;font-size:13px;cursor:pointer;font-family:system-ui,sans-serif;}
.btn-restart:hover{background:rgba(255,255,255,.08);}

/* === SETUP SCREEN === */
.setup-scr{padding:32px 20px 40px;min-height:100vh;display:flex;flex-direction:column;}
.setup-logo{font-size:36px;margin-bottom:8px;}
.setup-title{font-size:28px;font-weight:bold;color:#d4a017;font-family:'Georgia',serif;margin-bottom:2px;}
.setup-sub{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(212,160,23,.55);margin-bottom:28px;font-family:system-ui,sans-serif;}
.setup-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:rgba(240,230,208,.45);margin-bottom:8px;font-family:system-ui,sans-serif;}
.setup-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(212,160,23,.3);border-radius:8px;padding:12px 14px;font-size:16px;color:#f0e6d0;font-family:'Georgia',serif;outline:none;margin-bottom:24px;}
.setup-input:focus{border-color:#d4a017;}
.setup-input::placeholder{color:rgba(240,230,208,.28);}
.setup-btn{width:100%;background:linear-gradient(135deg,#d4a017,#a87c0c);color:#1a1100;border:none;border-radius:10px;padding:15px;font-size:16px;font-weight:bold;cursor:pointer;font-family:'Georgia',serif;margin-top:auto;box-shadow:0 4px 20px rgba(212,160,23,.28);}
.setup-btn:hover{background:linear-gradient(135deg,#e5b420,#c09010);}
.setup-note{font-size:11px;color:rgba(240,230,208,.3);text-align:center;margin-top:14px;font-family:system-ui,sans-serif;line-height:1.5;}

/* === PRES SELECT === */
.pres-scr{padding:16px;}
.pres-title{font-size:13px;color:rgba(240,230,208,.55);margin-bottom:14px;font-family:system-ui,sans-serif;}
.pres-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pres-card{background:rgba(255,255,255,.04);border:1px solid rgba(212,160,23,.2);border-radius:10px;padding:14px 12px;cursor:pointer;transition:all .15s;}
.pres-card:hover{background:rgba(212,160,23,.1);border-color:rgba(212,160,23,.42);}
.pres-em{font-size:28px;margin-bottom:6px;}
.pres-name{font-size:13px;font-weight:bold;color:#f0e6d0;margin-bottom:3px;}
.pres-desc{font-size:10px;color:rgba(240,230,208,.48);font-family:system-ui,sans-serif;line-height:1.3;}
.legacy-warn{background:rgba(180,80,0,.15);border:1px solid rgba(212,160,23,.28);border-radius:8px;padding:10px 14px;font-size:12px;color:rgba(240,230,208,.68);margin-bottom:14px;font-family:system-ui,sans-serif;font-style:italic;}

/* === TOAST === */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(15,12,5,.96);border:1px solid rgba(212,160,23,.4);color:#f0e6d0;border-radius:24px;padding:9px 20px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s,transform .3s;white-space:nowrap;font-family:system-ui,sans-serif;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(212,160,23,.28);border-radius:2px;}

</style>
</head>
<body>
<div id="app"><div id="ui"></div></div>
<div class="toast" id="toast"></div>
<script>
// ─────────────────────────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────────────────────────
const CATS=[
  {id:'directiva',label:'Despachos y Maletines',emoji:'💼',color:'#d4a017'},
  {id:'vestuario',label:'El Vestuario Salvaje',  emoji:'🍺',color:'#c44fa8'},
  {id:'banquillo',label:'El Banquillo Hirviendo',emoji:'📋',color:'#378add'},
  {id:'prensa',   label:'Gradas y Prensa',       emoji:'📸',color:'#c8102e'},
  {id:'partido',  label:'El Circo del Partido',  emoji:'⚽',color:'#1d9e75'}
];

const CARDS=[
  // ── DIRECTIVA ──
  {id:'c1',cat:'directiva',emoji:'💼',ctx:'Un hombre con gabardina espera en el parking…',
   title:'El Maletín Misterioso',desc:'Un emisario te ofrece una maleta llena de dinero si "aflojas" el próximo partido.',
   a:{label:'Aceptar el trato',hint:'¡Venga el oro!',fx:{money:+30,press:-5,vest:-10,power:-5},bomb:true},
   b:{label:'Rechazar y denunciar',hint:'Ni hablar',fx:{money:-5,press:+20,vest:+5,power:+10}},
   paper:{name:'El Chiringuito News',headline:'¡ESCÁNDALO! El presidente acepta soborno en el parking del estadio',sub:'Fuentes confirman que el dinero llegó en una maleta Samsonite negra con ruedas.'}},

  {id:'c2',cat:'directiva',emoji:'👦',ctx:'El presidente hace una llamada muy incómoda…',
   title:'El Fichaje Fantasma',desc:'El presidente exige fichar al hijo de su socio. Es malísimo.',

function clamp(v){return Math.max(0,Math.min(100,v));}
function rnd(arr){return arr[Math.floor(Math.random()*arr.length)];}
function catInfo(id){return CATS.find(c=>c.id===id)||{label:id,emoji:'⚽',color:'#888'};}

function getMote(){
  const s=G.stats;
  // 8 specific apodos — GUIA.md
  if(s.money<20&&s.press<20)return'el Impresentable';
  if(G.legacyCorrupt>=3&&G.legacyCorrupt>G.legacyHonest)return'el Corrupto';
  if(G.legacyHonest>=4&&G.legacyCorrupt===0)return'el Honrado';
  if(G.champions>=1&&G.legacyHonest>=2&&G.legacyCorrupt===0)return'el Galáctico';
  if(G.legacyPopulist>=6)return'el Populista';
  if(G.legacyPowerDec>=7&&G.legacyVestSanction>=4)return'el Tirano';
  if(G.legacyVestFavor>=6&&G.legacyVestSanction<2)return'el Padre del Vestuario';
  if(s.money>=75&&G.legacyPopulist<3)return'el Tacaño';
  // Fallback to week/stat-based motes
  for(const m of MOTE_BY_STAT){if(m.c(G))return m.n;}
  let name=MOTE_BY_WEEKS[0].n;
  for(const lvl of MOTE_BY_WEEKS){if(G.weeks>=lvl.t)name=lvl.n;}
  return name;
}

// ─────────────────────────────────────────────────────────────────
// CARD PICKING
// ─────────────────────────────────────────────────────────────────
function pickCard(){
  // Blatter check (end-game boss — GUIA.md: 2+ títulos, Finanzas > 55, Afición > 45, legado 3+)
  if(!G.blatterDone&&G.champions>=2&&G.stats.power>55&&G.stats.money>45&&G.reign>=3){
    G.blatterDone=true;
    return BLATTER_CARD;
  }
  // FIFA Boss check (minor officials)
  if(G.weeks>=G.nextFifaBossAt){
    const avail=FIFA_BOSS_CARDS.filter(c=>!G.fifaBossUsed.has(c.id));
    if(avail.length>0){
      G.nextFifaBossAt+=50;
      const bc=rnd(avail);
      G.fifaBossUsed.add(bc.id);
      return bc;
    }
  }
  // Bomb queue
  if(G.bombs.length>0&&G.weeks>=G.bombs[0].at){
    return G.bombs.shift().card;
  }
  let pool=CARDS.filter(c=>!G.seen.has(c.id));
  if(pool.length===0){G.seen.clear();pool=CARDS.filter(c=>c.id!=='c100');}
  // Champions card — GUIA.md: Afición > 50, RRPP > 50, más de 15 turnos. NOT added to seen so it can reappear.
  if(G.stats.money>50&&G.stats.press>50&&G.weeks>15){
    const f=CARDS.find(c=>c.id==='c100');
    if(f&&!G.seen.has('c100'))pool.push(f);
  }
  return rnd(pool);
}

// ─────────────────────────────────────────────────────────────────
// CHOOSE
// ─────────────────────────────────────────────────────────────────
function choose(idx){
  if(DRAG.locked)return;
  const card=G.currentCard;
  if(!card)return;
  const ch=idx===0?card.a:card.b;
  const other=idx===0?card.b:card.a;
  if(!ch)return;

  try{
    // Track corrupt/honest decisions
    if(ch.bomb){G.track.corrupt++;G.legacyCorrupt++;}
    else if(other&&other.bomb){G.track.honest++;G.legacyHonest++;}

    // Track decisions for apodo system (GUIA.md)
    if(ch.fx){
      if((ch.fx.money>0||ch.fx.press>0)&&!ch.bomb)G.legacyPopulist++;
      if(ch.fx.power>5)G.legacyPowerDec++;
      if(ch.fx.vest>5)G.legacyVestFavor++;
      if(ch.fx.vest<-5)G.legacyVestSanction++;
    }

    // Win
    if(ch.win){
      applyFx(ch.fx);
      G.weeks++;G.track.totalTurns++;
      // c100 and cBlatter NOT added to seen — GUIA.md: can reappear in future reigns
      if(card.id!=='c100'&&card.id!=='cBlatter'){G.seen.add(card.id);}
      // Track champions titles
      if(card.id==='c100'){G.champions++;}
      endRound(typeof ch.win==='string'?ch.win:'champions');
      return;
    }

    applyFx(ch.fx);

    // FIFA curse
    if(ch.fifaCurse){
      G.fifaCurses.push({stat:ch.fifaCurse.stat,endsAt:G.weeks+ch.fifaCurse.weeks});
      G.statsHidden[ch.fifaCurse.stat]=true;
      showToast('⚠️ El Gran Jefe oculta tu '+statLabel(ch.fifaCurse.stat)+' durante '+ch.fifaCurse.weeks+' semanas');
    }

    // Schedule bomb card
    if(ch.bomb){
      const pool=CARDS.filter(c=>c.id!==card.id&&!c.win);
      G.bombs.push({at:G.weeks+3+Math.floor(Math.random()*4),card:rnd(pool)});
    }

    // Newspaper popup
    if(card.paper&&idx===0&&ch.bomb){
      G.pendingNewspaper=card.paper;
    } else if(ch.bomb&&Math.random()<0.55){
      G.pendingNewspaper={
        name:rnd(RANDOM_PAPERS),
        headline:rnd(RANDOM_OPENINGS)+' '+card.title.toUpperCase()+' — El presidente implicado',
        sub:rnd(RANDOM_SUBS)
      };
    }

    G.seen.add(card.id);
    G.weeks++;G.track.totalTurns++;
    tickFifaCurses();

    // Leyenda del Club: all 4 stats > 80 for 5 consecutive turns
    if(Object.values(G.stats).every(v=>v>80)){
      G.highStatTurns=(G.highStatTurns||0)+1;
      if(G.highStatTurns>=5){endRound('legend');return;}
    }else{
      G.highStatTurns=0;
    }

    const end=checkEnd();
    if(end){endRound(end);return;}

    G.currentCard=pickCard();
    render();
  }finally{DRAG.locked=false;}
}

function applyFx(fx){
  Object.keys(fx).forEach(k=>{
    if(G.stats[k]!==undefined)G.stats[k]=clamp(G.stats[k]+fx[k]);
  });
}

function tickFifaCurses(){
  G.fifaCurses=G.fifaCurses.filter(c=>{
    if(G.weeks>=c.endsAt){
      G.statsHidden[c.stat]=false;
      showToast('🎉 '+statLabel(c.stat)+' ya es visible de nuevo');
      return false;
    }
    return true;
  });
}

function statLabel(k){return({money:'👥 Afición',press:'📰 Relaciones Públicas',vest:'⚽ Poder Deportivo',power:'💰 Finanzas'})[k]||k;}

function checkEnd(){
  const s=G.stats;
  // Colapso Total — GUIA.md: multiple stats simultaneously at 0 (checked first for flavor)
  if([s.money,s.press,s.power].filter(v=>v<=5).length>=3)return'collapse';
  // Death at 0 (stat collapse)
  if(s.press<=0)return'press';
  if(s.money<=0)return'money';
  if(s.vest<=0)return'vest';
  if(s.power<=0)return'power';
  // Death at 100 — core Reigns mechanic: "Si cualquiera llega a 0 o a 100, tu reinado termina"
  if(s.money>=100)return'money100';
  if(s.press>=100)return'press100';
  if(s.vest>=100)return'vest100';
  if(s.power>=100)return'power100';
  return null;
}

// ─────────────────────────────────────────────────────────────────
// ROUND END / DEATH
// ─────────────────────────────────────────────────────────────────
function endRound(type){
  G.deathType=type;
  // Save to timeline
  G.timeline.push({
    pres:G.presName||'Desconocido',
    weeks:G.weeks,
    cause:type,
    portrait:G.currentPortrait,
    reign:G.reign
  });
  G.screen='death';
  G.pendingNewspaper=null;
  render();
}

// "Siguiente Sucesor" – new reign, keep timeline
function nextSuccessor(){
  const tl=G.timeline;
  const clubName=G.clubName;
  // Preserve global counters across successions
  const totalWeeks=G.totalWeeks+G.weeks;
  const champions=G.champions;
  const achievedAny=G.achievedAny;
  const corruptAll=G.corruptAll+G.legacyCorrupt;
  const honestAll=G.honestAll+G.legacyHonest;

  const newG=makeState();
  newG.timeline=tl;
  newG.clubName=clubName;
  newG.reign=tl.length+1;
  newG.totalWeeks=totalWeeks;
  newG.champions=champions;
  newG.achievedAny=achievedAny;
  newG.corruptAll=corruptAll;
  newG.honestAll=honestAll;

  // GUIA.md inheritance: Afición −4 pts per succession, RRPP −8 pts per succession, vest/power reset 30–50 random
  const successions=tl.length;
  newG.stats.money=clamp(40 - successions*4);
  newG.stats.press=clamp(40 - successions*8);
  newG.stats.vest=30+Math.floor(Math.random()*21);   // 30–50
  newG.stats.power=30+Math.floor(Math.random()*21);  // 30–50

  newG.screen='presSelect';
  newG.inherited=tl.length>0?humanCause(tl[tl.length-1].cause):null;
  G=newG;
  render();
}

// ─────────────────────────────────────────────────────────────────
// SWIPE
// ─────────────────────────────────────────────────────────────────
function attachSwipe(){
  const outer=document.getElementById('card-outer');
  if(!outer)return;
  outer.addEventListener('pointerdown',onDown,{passive:false});
  outer.addEventListener('pointermove',onMove,{passive:false});
  outer.addEventListener('pointerup',onUp,{passive:false});
  outer.addEventListener('pointercancel',onCancel);
}

function onDown(e){
  if(DRAG.locked)return;
  e.preventDefault();
  DRAG.active=true;
  DRAG.startX=e.clientX;
  DRAG.currentX=e.clientX;
  try{document.getElementById('card-outer').setPointerCapture(e.pointerId);}catch(_){DRAG.active=false;return;}
  const card=document.getElementById('ev-card');
  if(card){card.style.transition='none';card.classList.add('is-dragging');}
}

function onMove(e){
  if(!DRAG.active)return;
  e.preventDefault();
  DRAG.currentX=e.clientX;
  updateDrag();
}

function onUp(e){
  if(!DRAG.active)return;
  DRAG.active=false;
  const dx=DRAG.currentX-DRAG.startX;
  const card=document.getElementById('ev-card');
  if(card)card.classList.remove('is-dragging');
  if(Math.abs(dx)>=DRAG.threshold){
    DRAG.locked=true;
    animateOut(dx>0?'right':'left',dx>0?0:1);
  }else{
    snapBack();
  }
}

function onCancel(){DRAG.active=false;snapBack();}

function updateDrag(){
  const card=document.getElementById('ev-card');
  const hl=document.getElementById('hint-l');
  const hr=document.getElementById('hint-r');
  if(!card)return;
  const dx=DRAG.currentX-DRAG.startX;
  const rot=dx*0.07;
  card.style.transform=`translateX(${dx}px) rotate(${rot}deg)`;
  const pct=Math.min(Math.abs(dx)/DRAG.threshold,1);
  if(hr)hr.style.opacity=dx>0?pct:0;
  if(hl)hl.style.opacity=dx<0?pct:0;
}

function snapBack(){
  const card=document.getElementById('ev-card');
  const hl=document.getElementById('hint-l');
  const hr=document.getElementById('hint-r');
  if(card){card.style.transition='transform .35s cubic-bezier(.25,.8,.25,1)';card.style.transform='';}
  if(hl)hl.style.opacity=0;
  if(hr)hr.style.opacity=0;
}

function animateOut(dir,idx){
  const card=document.getElementById('ev-card');
  if(card){
    card.style.transition='transform .28s ease-in,opacity .28s ease-in';
    card.style.transform=`translateX(${dir==='right'?340:-340}px) rotate(${dir==='right'?18:-18}deg)`;
    card.style.opacity='0';
  }
  setTimeout(()=>{DRAG.locked=false;choose(idx);},290);
}

}
